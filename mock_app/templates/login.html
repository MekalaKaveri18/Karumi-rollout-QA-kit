<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Northwind CRM — Sign in</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <div class="brand" style="justify-content:center; margin-bottom:14px;">
        <div class="mark"></div> Northwind CRM
      </div>
      <h1>Sign in</h1>
      <p class="subtitle">Any username / password works in this demo.</p>
      {% if error %}<p class="error-text" id="login-error">{{ error }}</p>{% endif %}
      <form method="post" action="/login" id="login-form">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="off">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password">
        </div>
        <button type="submit" id="login-submit" style="width:100%;">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
